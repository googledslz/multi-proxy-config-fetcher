name: Update Proxy Configs  # 工作流名称：更新代理配置

on:
  schedule:
    # 定时触发：每3小时运行一次（对应德黑兰/北京等不同时区的时间点）
    - cron: '30 20 * * *'  # 协调世界时 20:30
    - cron: '30 23 * * *'
    - cron: '30 2 * * *'
    - cron: '30 5 * * *'
    - cron: '30 8 * * *'
    - cron: '30 11 * * *'
    - cron: '30 14 * * *'
    - cron: '30 17 * * *'
  workflow_dispatch:      # 允许手动点击按钮触发执行

permissions:
  contents: write         # 赋予工作流写入权限，以便它能把更新后的文件推送到仓库

jobs:
  update-configs:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟机环境运行
    timeout-minutes: 120   # 最大运行时间 120 分钟

    steps:
      - name: Checkout repository  步骤1：检出/拉取本仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python       步骤2：安装并配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies  步骤3：安装 Python 依赖库
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Xray with retry  步骤4：安装 Xray 核心（包含自动失败重试机制）
        run: |
          # 此处代码逻辑：尝试从官方获取最新版，失败则重试 3 次，最后失败则使用备用版本
          # ... (省略中间具体的安装脚本)
      
      - name: Install sing-box with retry  步骤5：安装 Sing-box 核心（带重试机制）
        run: |
          # 此处代码逻辑：通过 GitHub API 获取最新 .deb 包并安装
          # ... (省略中间具体的安装脚本)
      
      - name: Create directories  步骤6：创建必要的资源和配置文件夹
        run: |
          mkdir -p assets
          mkdir -p configs
      
      - name: Run config fetcher  步骤7：运行爬虫/提取器脚本，获取原始代理链接
        run: python src/fetch_configs.py
        continue-on-error: true  # 即使报错也继续执行下一步
      
      - name: Enrich configs with location data  步骤8：为节点添加地理位置信息（IP 归属地）
        run: python src/enrich_configs.py configs/proxy_configs.txt configs/location_cache.json
        continue-on-error: true
      
      - name: Rename configs  步骤9：根据地理位置等信息重新命名节点
        run: python src/rename_configs.py configs/location_cache.json configs/proxy_configs.txt configs/proxy_configs.txt
        continue-on-error: true
      
      - name: Test configs with Xray  步骤10：使用 Xray 对节点进行可用性测试
        run: python src/xray_config_tester.py configs/proxy_configs.txt configs/proxy_configs_tested.txt
        continue-on-error: true
      
      - name: Update input file with tested configs  步骤11：用测试通过的节点覆盖旧文件
        run: cp configs/proxy_configs_tested.txt configs/proxy_configs.txt
        continue-on-error: true
      
      - name: Convert configs to sing-box format  步骤12：将通用格式转换为 Sing-box 专用格式
        run: python src/config_to_singbox.py
      
      - name: Backup original sing-box config  步骤13：备份原始 Sing-box 配置文件
        run: |
          if [ -f configs/singbox_configs.json ]; then
            cp configs/singbox_configs.json configs/singbox_configs_all.json
          fi
      
      - name: Test sing-box configs  步骤14：再次测试 Sing-box 格式配置的连通性
        run: python src/config_tester.py configs/singbox_configs_all.json configs/singbox_configs_tested.json
        continue-on-error: true
      
      - name: Filter insecure configs and generate secure outputs  步骤15：过滤掉不安全的节点并生成安全版文件
        run: python src/security_filter.py
        continue-on-error: true
      
      - name: Convert tested configs to Xray format  步骤16：转换为 Xray 负载均衡格式
        run: python src/xray_balancer.py
        continue-on-error: true
      
      - name: Generate charts and reports  步骤17：生成节点性能图表和可视化报告
        run: python src/generate_charts.py
      
      - name: Update README timestamps and stats  步骤18：在 README 页面更新最后更新时间和统计数据
        run: |
          # 使用 sed 命令替换 README 里的时间戳，防止浏览器缓存图片
          # ... (具体正则替换逻辑)
      
      # ==========================================
      # 重点修改部分：提交变更并推送到 GitHub
      # ==========================================
      - name: Commit and push changes (提交并推送更改)
        run: |
          # 1. 配置 Git 机器人用户信息
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 2. 将所有更新过的配置文件添加到暂存区
          git add configs/proxy_configs.txt
          git add configs/proxy_configs_tested.txt
          git add configs/location_cache.json
          git add configs/singbox_configs_all.json
          git add configs/singbox_configs_tested.json
          git add configs/singbox_configs_secure.json
          git add configs/xray_loadbalanced_config.json
          git add configs/xray_secure_loadbalanced_config.json
          git add configs/channel_stats.json
          git add assets/
          git add README.md
          git add README_FA.md
          git add README_CN.md
          git add README_RU.md
          
          # 3. 检查是否有文件变动，如果没有则退出
          if git diff --cached --quiet; then
            echo "No changes to commit (没有需要提交的变动)"
            exit 0
          fi
          
          # 4. 提交到本地仓库
          git commit -m "Update proxy configs, stats and reports (自动更新代理配置、统计和报告)"
          
          # 5. 推送到 GitHub（带 5 次失败重试机制）
          max_retries=5
          retry_count=0
          
          while [ $retry_count -lt $max_retries ]; do
            if git push; then
              echo "Successfully pushed changes (成功推送更改)"
              exit 0
            else
              retry_count=$((retry_count + 1))
              if [ $retry_count -lt $max_retries ]; then
                echo "Push failed, retrying in 30 seconds... (推送失败，30秒后重试... 第 $retry_count 次)"
                sleep 30
                git pull --rebase origin main || true # 尝试合并可能存在的远程冲突
              fi
            fi
          done
          
          echo "Failed to push after $max_retries attempts (尝试 $max_retries 次后依然推送失败)"
          exit 1
